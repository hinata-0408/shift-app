{% extends 'base.html' %}

{% block title %}ログイン - レジシフト{% endblock %}

{% block extra_css %}
<style>
    body {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: var(--gray-100);
    }

    .header { display: none; }

    .main {
        width: 100%;
        max-width: 360px;
        padding: 1rem;
    }

    .login-card {
        background: white;
        border-radius: 0.75rem;
        border: 1px solid var(--gray-200);
        overflow: hidden;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
    }

    .login-brand {
        background: var(--brand);
        padding: 1.5rem;
        text-align: center;
    }

    .login-brand-name {
        font-size: 1.25rem;
        font-weight: 700;
        color: white;
        letter-spacing: -0.01em;
    }

    .login-brand-sub {
        font-size: 0.75rem;
        color: rgba(255, 255, 255, 0.6);
        margin-top: 0.25rem;
    }

    .login-body { padding: 1.5rem; }

    .error-message {
        background: #fee2e2;
        color: #991b1b;
        padding: 0.625rem 0.75rem;
        border-radius: 0.375rem;
        font-size: 0.8125rem;
        margin-bottom: 1rem;
        border-left: 3px solid var(--state-alert);
    }
</style>
{% endblock %}

{% block content %}
<div class="login-card">
    <div class="login-brand">
        <div class="login-brand-name">レジシフト</div>
        <div class="login-brand-sub">レジ担当シフト自動作成システム</div>
    </div>
    <div class="login-body">
        {% if messages %}
        {% for message in messages %}
        <div class="error-message">{{ message }}</div>
        {% endfor %}
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label class="form-label" for="username">ユーザー名</label>
                <input type="text" name="username" id="username" class="form-input" required autofocus>
            </div>
            <div class="form-group">
                <label class="form-label" for="password">パスワード</label>
                <input type="password" name="password" id="password" class="form-input" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; margin-top: 0.5rem;">
                ログイン
            </button>
        </form>
    </div>
</div>
{% endblock %}
