<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}レジシフト{% endblock %}</title>
    <style>
        :root {
            /* ブランド色: ヘッダー・アクセントのみ */
            --brand: #1a3a5c;
            /* 操作色: ボタン・クリック可能要素 */
            --action: #1d6fbc;
            --action-hover: #1558a0;
            /* 状態色: 自動生成 */
            --state-auto: #6d28d9;
            /* 状態色: 手動編集 */
            --state-manual: #047857;
            /* 注意色: 未割当・エラー */
            --state-alert: #b91c1c;
            /* 区分色: 店長 */
            --state-manager: #92400e;

            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-400: #9ca3af;
            --gray-500: #6b7280;
            --gray-600: #4b5563;
            --gray-700: #374151;
            --gray-900: #111827;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', sans-serif;
            background: var(--gray-50);
            color: var(--gray-900);
            line-height: 1.5;
        }

        .header {
            background: white;
            border-bottom: 1px solid var(--gray-200);
            padding: 0 1rem;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-title {
            font-size: 1rem;
            font-weight: 700;
            color: var(--brand);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            letter-spacing: -0.01em;
        }

        .header-title::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 16px;
            background: var(--brand);
            border-radius: 2px;
        }

        .header-nav {
            display: flex;
            gap: 0.25rem;
            align-items: center;
        }

        .header-nav a {
            color: var(--gray-500);
            text-decoration: none;
            font-size: 0.875rem;
            padding: 0.375rem 0.75rem;
            border-radius: 0.375rem;
            transition: color 0.1s;
            border-bottom: 2px solid transparent;
        }

        .header-nav a:hover { color: var(--gray-700); }

        .header-nav a.active {
            color: var(--brand);
            font-weight: 600;
            border-bottom-color: var(--action);
            background: none;
            border-radius: 0;
        }

        .user-info {
            font-size: 0.75rem;
            color: var(--gray-400);
            padding: 0 0.5rem;
        }

        .main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1.25rem 1rem;
        }

        /* ボタン */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.375rem;
            padding: 0.5rem 1rem;
            font-size: 0.875rem;
            font-weight: 500;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: background 0.1s;
            text-decoration: none;
        }

        .btn-primary {
            background: var(--action);
            color: white;
        }

        .btn-primary:hover { background: var(--action-hover); }

        .btn-outline {
            background: white;
            border: 1px solid var(--gray-300);
            color: var(--gray-700);
        }

        .btn-outline:hover { background: var(--gray-100); }

        .btn-danger {
            background: var(--state-alert);
            color: white;
        }

        .btn-danger:hover { background: #991b1b; }

        .btn-sm { padding: 0.375rem 0.75rem; font-size: 0.75rem; }

        /* カード */
        .card {
            background: white;
            border-radius: 0.75rem;
            border: 1px solid var(--gray-200);
            overflow: hidden;
        }

        .card-header {
            padding: 0.875rem 1rem;
            border-bottom: 1px solid var(--gray-200);
            font-weight: 600;
            font-size: 0.875rem;
            color: var(--gray-700);
        }

        .card-body { padding: 1rem; }

        /* フォーム */
        .form-group { margin-bottom: 1rem; }

        .form-label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 0.375rem;
            color: var(--gray-600);
        }

        .form-input {
            width: 100%;
            padding: 0.625rem 0.75rem;
            font-size: 0.875rem;
            border: 1px solid var(--gray-300);
            border-radius: 0.5rem;
            transition: border-color 0.1s;
            background: white;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--action);
            box-shadow: 0 0 0 3px rgba(29, 111, 188, 0.1);
        }

        /* レベルバッジ */
        .level-badge {
            display: inline-flex;
            align-items: center;
            padding: 0.125rem 0.5rem;
            border-radius: 9999px;
            font-size: 0.6875rem;
            font-weight: 600;
            letter-spacing: 0.02em;
        }

        .level-1 { background: #dcfce7; color: #166534; }
        .level-2 { background: #dbeafe; color: #1e40af; }
        .level-3 { background: #fef3c7; color: #92400e; }
        .level-4 { background: #fee2e2; color: #991b1b; }
        .level-0 { background: var(--gray-100); color: var(--gray-500); }

        /* モーダル */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 1rem;
        }

        .modal-overlay.active { display: flex; }

        .modal {
            background: white;
            border-radius: 0.75rem;
            width: 100%;
            max-width: 400px;
            max-height: 80vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .modal-header {
            padding: 0.875rem 1rem;
            border-bottom: 1px solid var(--gray-200);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .modal-title {
            font-weight: 600;
            font-size: 0.9375rem;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 1.25rem;
            cursor: pointer;
            color: var(--gray-400);
            line-height: 1;
            padding: 0.25rem;
        }

        .modal-close:hover { color: var(--gray-700); }

        .modal-body {
            padding: 0.75rem;
            overflow-y: auto;
        }

        /* トースト */
        .toast {
            position: fixed;
            bottom: 1rem;
            right: 1rem;
            background: var(--gray-900);
            color: white;
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.25s;
            z-index: 2000;
        }

        .toast.show { transform: translateY(0); opacity: 1; }
        .toast.success { background: var(--state-manual); }
        .toast.error { background: var(--state-alert); }

        /* ユーティリティ */
        .text-center { text-align: center; }
        .text-sm { font-size: 0.875rem; }
        .text-xs { font-size: 0.75rem; }
        .text-muted { color: var(--gray-500); }
        .mt-4 { margin-top: 1rem; }
        .mb-4 { margin-bottom: 1rem; }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <header class="header">
        <div class="header-title">レジシフト</div>
        {% if user.is_authenticated %}
        <nav class="header-nav">
            <a href="{% url 'index' %}" class="{% if request.resolver_match.url_name == 'index' %}active{% endif %}">シフト</a>
            <a href="{% url 'staff_list' %}" class="{% if request.resolver_match.url_name == 'staff_list' %}active{% endif %}">スタッフ</a>
            <span class="user-info">{{ user.username }}</span>
            <a href="{% url 'logout' %}">ログアウト</a>
        </nav>
        {% endif %}
    </header>

    <main class="main">
        {% block content %}{% endblock %}
    </main>

    <div id="toast" class="toast"></div>

    <script>
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast ' + type + ' show';
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
